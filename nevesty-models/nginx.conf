# =============================================================================
# Nevesty Models — standalone nginx configuration (non-Docker / bare-metal)
# =============================================================================
# USAGE:
#   1. Replace every occurrence of "your-domain.com" with your real domain.
#   2. Obtain TLS certificates first:
#        sudo certbot certonly --webroot -w /var/www/certbot -d your-domain.com -d www.your-domain.com
#   3. Copy or symlink this file:
#        sudo cp nginx.conf /etc/nginx/sites-available/nevesty-models
#        sudo ln -s /etc/nginx/sites-available/nevesty-models /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# ---- Global tuning (merge into existing nginx.conf if already present) ------
# worker_processes  auto;
# events { worker_connections 4096; multi_accept on; use epoll; }

http {
    # ---- Mime types & basics -------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;
    server_tokens off;   # hide nginx version

    # ---- Gzip ----------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   5;
    gzip_proxied      any;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml image/svg+xml application/font-woff2;

    # ---- Rate-limiting zones -------------------------------------------------
    limit_req_zone $binary_remote_addr zone=nevesty_api:10m    rate=60r/m;
    limit_req_zone $binary_remote_addr zone=nevesty_auth:10m   rate=5r/m;
    limit_req_zone $binary_remote_addr zone=nevesty_upload:10m rate=10r/m;

    # ---- Upstream (app runs on localhost:3000 via PM2) -----------------------
    upstream nevesty_app {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    # =========================================================================
    # HTTP → HTTPS redirect (port 80)
    # Also serves ACME challenge for Certbot renewal.
    # =========================================================================
    server {
        listen 80;
        listen [::]:80;
        # ⬇ CHANGE THIS to your real domain
        server_name your-domain.com www.your-domain.com;

        # Certbot webroot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # HTTPS server (port 443)
    # =========================================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        # ⬇ CHANGE THIS to your real domain
        server_name your-domain.com www.your-domain.com;

        # ----- TLS -----------------------------------------------------------
        # ⬇ Update paths if your domain differs
        ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;

        # OCSP stapling (requires a CA-issued cert, not self-signed)
        ssl_stapling        on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/letsencrypt/live/your-domain.com/chain.pem;
        resolver            1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout    5s;

        # ----- Security headers ----------------------------------------------
        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' wss:; font-src 'self'; frame-ancestors 'none';" always;

        # ----- Upload / body size --------------------------------------------
        # Default limit; overridden per-location for file-upload endpoints
        client_max_body_size 10M;

        # ----- Gzip (per-server override, inherits http-level settings) ------
        gzip on;

        # =====================================================================
        # Location blocks
        # =====================================================================

        # Health check — bypass rate limits and auth
        location = /api/health {
            proxy_pass         http://nevesty_app;
            proxy_http_version 1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            add_header         Cache-Control    "no-store";
            access_log         off;
        }

        # Auth endpoints — strict rate limit (5 req/min, burst 5)
        location ~ ^/api/(auth|login|register) {
            limit_req  zone=nevesty_auth burst=5 nodelay;
            proxy_pass http://nevesty_app;
            proxy_http_version 1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 15s;
            add_header         Cache-Control    "no-store";
        }

        # File-upload endpoints — 50 MB body limit + upload rate limit
        location ~ ^/api/admin/(models|photos|upload) {
            limit_req              zone=nevesty_upload burst=5 nodelay;
            client_max_body_size   50M;
            proxy_pass             http://nevesty_app;
            proxy_http_version     1.1;
            proxy_set_header       Host             $host;
            proxy_set_header       X-Real-IP        $remote_addr;
            proxy_set_header       X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_read_timeout     120s;
            proxy_request_buffering off;   # stream uploads directly to Node
            add_header             Cache-Control "no-store";
        }

        # General API — rate limited, no cache
        location /api/ {
            limit_req  zone=nevesty_api burst=30 nodelay;
            proxy_pass http://nevesty_app;
            proxy_http_version 1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            add_header         Cache-Control    "no-store";
        }

        # WebSocket — long-lived connection for real-time order updates
        location /ws {
            proxy_pass         http://nevesty_app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade          $http_upgrade;
            proxy_set_header   Connection       "Upgrade";
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Static assets — 30-day browser cache
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webp)$ {
            proxy_pass         http://nevesty_app;
            proxy_http_version 1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            expires            30d;
            add_header         Cache-Control    "public, max-age=2592000, immutable";
            access_log         off;
        }

        # Everything else — standard reverse proxy
        location / {
            proxy_pass         http://nevesty_app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade          $http_upgrade;
            proxy_set_header   Connection       "upgrade";
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
        }
    }
}
