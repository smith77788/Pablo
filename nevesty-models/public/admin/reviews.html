<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Отзывы — Nevesty Models Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/css/admin.css" />
  <style>
    .review-card {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .review-card:hover { border-color: rgba(201,169,110,0.4); }
    .review-card.pending { border-left: 3px solid var(--gold); }
    .review-card.approved { border-left: 3px solid var(--success); }
    .review-card.rejected { border-left: 3px solid var(--text-dim); }

    .review-header {
      display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px;
    }
    .review-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(201,169,110,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
      border: 1px solid rgba(201,169,110,0.3);
    }
    .review-meta { flex: 1; }
    .review-author {
      font-weight: 600; color: var(--text); font-size: 0.9rem;
    }
    .review-model {
      font-size: 0.75rem; color: var(--text-muted); margin-top: 2px;
    }
    .review-date {
      font-size: 0.72rem; color: var(--text-dim);
    }
    .review-stars {
      font-size: 1rem; letter-spacing: 1px;
    }
    .review-text {
      font-size: 0.85rem; color: var(--text-muted);
      line-height: 1.6; margin: 12px 0;
      padding: 12px; background: var(--bg2);
      border-radius: 4px;
    }
    .review-actions {
      display: flex; gap: 8px; align-items: center;
    }
    .status-badge {
      display: inline-block; padding: 2px 10px;
      border-radius: 20px; font-size: 0.72rem; font-weight: 600;
    }
    .status-pending { background: rgba(201,169,110,0.15); color: var(--gold); }
    .status-approved { background: rgba(34,197,94,0.15); color: var(--success); }
    .status-rejected { background: rgba(255,255,255,0.06); color: var(--text-dim); }

    .filter-tabs {
      display: flex; gap: 4px; margin-bottom: 20px;
      border-bottom: 1px solid var(--border); padding-bottom: 0;
    }
    .filter-tab {
      padding: 8px 18px; font-size: 0.8rem; letter-spacing: 0.5px;
      color: var(--text-muted); cursor: pointer; border: none;
      background: none; border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: all 0.2s;
    }
    .filter-tab.active {
      color: var(--gold); border-bottom-color: var(--gold);
    }
    .filter-tab:hover:not(.active) { color: var(--text); }

    .stats-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
      margin-bottom: 24px;
    }
    .stat-mini {
      background: var(--bg1); border: 1px solid var(--border);
      border-radius: 6px; padding: 16px; text-align: center;
    }
    .stat-mini-val { font-size: 1.6rem; font-weight: 700; color: var(--gold); }
    .stat-mini-lbl { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; }

    .stars-avg {
      display: flex; align-items: center; gap: 6px;
      justify-content: center; margin-top: 6px;
    }
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--text-dim); font-size: 0.9rem;
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }

    @media (max-width: 640px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .review-actions { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-text">Nevesty Models</div>
      <div class="sidebar-logo-sub">Панель управления</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Главная</div>
      <a href="/admin/"><span class="nav-icon">📊</span> Dashboard</a>
      <div class="nav-section-label">Бизнес</div>
      <a href="/admin/orders.html"><span class="nav-icon">📋</span> Заявки <span class="nav-badge" id="newOrdersBadge" style="display:none">0</span></a>
      <a href="/admin/models.html"><span class="nav-icon">💃</span> Модели</a>
      <a href="/admin/reviews.html" class="active"><span class="nav-icon">⭐</span> Отзывы <span class="nav-badge" id="pendingBadge" style="display:none">0</span></a>
      <div class="nav-section-label">Аналитика</div>
      <a href="/admin/analytics.html"><span class="nav-icon">📈</span> Аналитика</a>
      <a href="/admin/factory.html"><span class="nav-icon">🤖</span> AI Factory</a>
      <div class="nav-section-label">Настройки</div>
      <a href="/admin/managers.html"><span class="nav-icon">👥</span> Менеджеры</a>
      <a href="/admin/settings.html"><span class="nav-icon">⚙️</span> Настройки</a>
      <a href="/" target="_blank"><span class="nav-icon">🌐</span> Сайт</a>
    </nav>
    <div class="sidebar-bottom">
      <div class="sidebar-user">
        <div class="sidebar-avatar sidebar-user-letter">A</div>
        <div class="sidebar-user-info">
          <strong class="sidebar-user-name">—</strong>
          <span class="sidebar-user-role">—</span>
        </div>
      </div>
      <button class="btn btn-sm btn-ghost" onclick="_admin.logout()" style="width:100%;margin-top:8px">Выйти</button>
    </div>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <button class="topbar-burger" id="burgerBtn" aria-label="Меню">☰</button>
      <div class="topbar-title">⭐ Управление отзывами</div>
      <div class="topbar-actions">
        <button class="btn btn-sm btn-ghost" onclick="loadReviews()" title="Обновить">↻</button>
      </div>
    </header>

    <div class="content-area">

      <!-- Stats -->
      <div class="stats-row" id="statsRow">
        <div class="stat-mini">
          <div class="stat-mini-val" id="totalCount">—</div>
          <div class="stat-mini-lbl">Всего отзывов</div>
        </div>
        <div class="stat-mini">
          <div class="stat-mini-val" id="approvedCount">—</div>
          <div class="stat-mini-lbl">Опубликовано</div>
        </div>
        <div class="stat-mini">
          <div class="stat-mini-val" id="pendingCount" style="color:var(--gold)">—</div>
          <div class="stat-mini-lbl">Ожидают проверки</div>
        </div>
        <div class="stat-mini">
          <div class="stat-mini-val" id="avgRating">—</div>
          <div class="stars-avg" id="avgStars"></div>
          <div class="stat-mini-lbl">Средний рейтинг</div>
        </div>
      </div>

      <!-- Filter tabs -->
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all" onclick="setFilter('all', this)">Все</button>
        <button class="filter-tab" data-filter="0" onclick="setFilter('0', this)">Ожидают ✋</button>
        <button class="filter-tab" data-filter="1" onclick="setFilter('1', this)">Опубликованные ✅</button>
      </div>

      <!-- Reviews list -->
      <div id="reviewsList">
        <div class="empty-state">
          <div class="icon">⏳</div>
          Загрузка отзывов...
        </div>
      </div>

      <!-- Pagination -->
      <div class="pagination" id="pagination" style="margin-top:20px"></div>

    </div>
  </div>

  <script src="/js/admin.js"></script>
  <script>
    let currentFilter = 'all';
    let currentPage = 1;
    const PAGE_SIZE = 20;

    const STAR = '⭐';
    const STAR_EMPTY = '☆';

    function stars(n) {
      n = Math.round(n || 0);
      return STAR.repeat(Math.min(n,5)) + STAR_EMPTY.repeat(Math.max(0,5-n));
    }

    function setFilter(f, el) {
      currentFilter = f;
      currentPage = 1;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      loadReviews();
    }

    async function loadStats() {
      try {
        const [allData, approvedData, pendingData] = await Promise.all([
          _admin.api('/admin/reviews?limit=1'),
          _admin.api('/admin/reviews?approved=1&limit=1'),
          _admin.api('/admin/reviews?approved=0&limit=1'),
        ]);
        document.getElementById('totalCount').textContent = allData.total || 0;
        document.getElementById('approvedCount').textContent = approvedData.total || 0;
        const pending = pendingData.total || 0;
        document.getElementById('pendingCount').textContent = pending;
        if (pending > 0) {
          document.getElementById('pendingBadge').textContent = pending;
          document.getElementById('pendingBadge').style.display = '';
        }
        // Average rating from all reviews
        const revs = allData.reviews || [];
        if (revs.length > 0) {
          // We need to load more to get accurate average - use a separate fetch
          loadAvgRating();
        } else {
          document.getElementById('avgRating').textContent = '—';
        }
      } catch (e) {
        console.error('Stats error:', e);
      }
    }

    async function loadAvgRating() {
      try {
        const data = await _admin.api('/admin/reviews?limit=100');
        const reviews = data.reviews || [];
        if (reviews.length === 0) { document.getElementById('avgRating').textContent = '—'; return; }
        const rated = reviews.filter(r => r.rating > 0);
        if (rated.length === 0) { document.getElementById('avgRating').textContent = '—'; return; }
        const avg = rated.reduce((s, r) => s + r.rating, 0) / rated.length;
        document.getElementById('avgRating').textContent = avg.toFixed(1);
        document.getElementById('avgStars').textContent = stars(Math.round(avg));
      } catch (e) {}
    }

    async function loadReviews() {
      const list = document.getElementById('reviewsList');
      list.innerHTML = '<div class="empty-state"><div class="icon">⏳</div>Загрузка...</div>';

      try {
        let url = `/admin/reviews?page=${currentPage}&limit=${PAGE_SIZE}`;
        if (currentFilter !== 'all') url += `&approved=${currentFilter}`;

        const data = await _admin.api(url);
        const reviews = data.reviews || [];

        if (reviews.length === 0) {
          list.innerHTML = `<div class="empty-state"><div class="icon">💬</div>${
            currentFilter === '0' ? 'Нет отзывов, ожидающих проверки' :
            currentFilter === '1' ? 'Нет опубликованных отзывов' : 'Отзывов пока нет'
          }</div>`;
          renderPagination(0, 0);
          return;
        }

        list.innerHTML = reviews.map(r => renderReview(r)).join('');
        renderPagination(data.page, data.pages);
      } catch (e) {
        list.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div>Ошибка загрузки отзывов</div>';
      }
    }

    function renderReview(r) {
      const approved = r.approved === 1;
      const statusClass = approved ? 'approved' : 'pending';
      const statusLabel = approved ? 'Опубликован' : 'На проверке';
      const statusBadgeClass = approved ? 'status-approved' : 'status-pending';
      const initial = (r.client_name || '?')[0].toUpperCase();
      const date = new Date(r.created_at).toLocaleString('ru-RU', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });

      return `
      <div class="review-card ${statusClass}" id="review-${r.id}">
        <div class="review-header">
          <div class="review-avatar">${initial}</div>
          <div class="review-meta">
            <div class="review-author">${_admin.escapeHtml(r.client_name || 'Аноним')}</div>
            ${r.model_name ? `<div class="review-model">Модель: ${_admin.escapeHtml(r.model_name)}</div>` : ''}
            <div class="review-date">${date}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div class="review-stars">${stars(r.rating)}</div>
            <span class="status-badge ${statusBadgeClass}">${statusLabel}</span>
          </div>
        </div>
        ${r.text ? `<div class="review-text">${_admin.escapeHtml(r.text)}</div>` : '<div class="review-text" style="color:var(--text-dim);font-style:italic">Без текста</div>'}
        <div class="review-actions">
          <button class="btn btn-sm ${approved ? 'btn-ghost' : 'btn-primary'}"
            onclick="toggleApprove(${r.id}, ${approved})">
            ${approved ? '🚫 Снять публикацию' : '✅ Опубликовать'}
          </button>
          <button class="btn btn-sm btn-danger" onclick="deleteReview(${r.id}, '${_admin.escapeHtml(r.client_name || 'Аноним').replace(/'/g, '')}')">
            🗑 Удалить
          </button>
          ${r.model_id ? `<a href="/model.html?id=${r.model_id}" target="_blank" class="btn btn-sm btn-ghost">👁 Модель</a>` : ''}
        </div>
      </div>`;
    }

    async function toggleApprove(id, currentlyApproved) {
      const card = document.getElementById(`review-${id}`);
      if (card) card.style.opacity = '0.5';
      try {
        await _admin.api(`/admin/reviews/${id}/approve`, { method: 'PUT' });
        await Promise.all([loadReviews(), loadStats()]);
      } catch (e) {
        if (card) card.style.opacity = '1';
        alert('Ошибка: ' + (e.message || 'Попробуйте снова'));
      }
    }

    async function deleteReview(id, name) {
      if (!confirm(`Удалить отзыв от "${name}"? Это действие необратимо.`)) return;
      try {
        await _admin.api(`/admin/reviews/${id}`, { method: 'DELETE' });
        const card = document.getElementById(`review-${id}`);
        if (card) {
          card.style.opacity = '0';
          card.style.transform = 'translateX(-10px)';
          card.style.transition = 'all 0.3s';
          setTimeout(() => card.remove(), 300);
        }
        loadStats();
      } catch (e) {
        alert('Ошибка удаления: ' + (e.message || 'Попробуйте снова'));
      }
    }

    function renderPagination(page, pages) {
      const nav = document.getElementById('pagination');
      if (!pages || pages <= 1) { nav.innerHTML = ''; return; }
      let html = '';
      if (page > 1) html += `<button class="btn btn-sm btn-ghost" onclick="goPage(${page-1})">← Пред.</button>`;
      html += `<span class="pagination-info">Стр. ${page} из ${pages}</span>`;
      if (page < pages) html += `<button class="btn btn-sm btn-ghost" onclick="goPage(${page+1})">След. →</button>`;
      nav.innerHTML = html;
    }

    function goPage(p) {
      currentPage = p;
      loadReviews();
      window.scrollTo({top:0, behavior:'smooth'});
    }

    // Init
    document.addEventListener('DOMContentLoaded', async () => {
      await _admin.init();
      // Burger menu
      document.getElementById('burgerBtn').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('open');
      });
      await Promise.all([loadStats(), loadReviews()]);
    });
  </script>
</body>
</html>
