<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход — Nevesty Models Admin</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="/css/admin.css" />
  </head>
  <body>
    <div class="login-page">
      <div class="login-orb login-orb-1"></div>
      <div class="login-orb login-orb-2"></div>
      <div class="login-box" id="loginBox">
        <div class="login-logo">Nevesty Models</div>
        <div class="login-sub">Панель управления</div>

        <!-- Step 1: username + password -->
        <form class="login-form" id="loginForm">
          <input class="login-input" type="text" id="username" placeholder="Логин" autocomplete="username" required />
          <input
            class="login-input"
            type="password"
            id="password"
            placeholder="Пароль"
            autocomplete="current-password"
            required
          />
          <div class="login-error" id="loginError"></div>
          <button class="login-btn" type="submit" id="loginBtn">Войти →</button>
        </form>

        <!-- Step 2: 2FA code (hidden until server says requires_2fa) -->
        <div id="totpPanel" style="display: none">
          <p style="text-align: center; font-size: 0.82rem; color: var(--text-muted); margin-bottom: 16px">
            Введите код из приложения аутентификации
          </p>
          <input
            class="login-input"
            type="number"
            id="totpCode"
            placeholder="000000"
            pattern="[0-9]{6}"
            maxlength="6"
            inputmode="numeric"
            autocomplete="one-time-code"
          />
          <div class="login-error" id="totpError"></div>
          <button class="login-btn" type="button" id="totpBtn" onclick="submitTotp()">Подтвердить</button>
          <button
            type="button"
            style="
              background: none;
              border: none;
              color: var(--text-dim);
              font-size: 0.75rem;
              cursor: pointer;
              width: 100%;
              margin-top: 10px;
              text-align: center;
            "
            onclick="resetToLogin()"
          >
            ← Вернуться к форме входа
          </button>
        </div>

        <p style="text-align: center; margin-top: 20px; font-size: 0.75rem; color: var(--text-dim)">
          <a href="/" style="color: var(--text-dim)">← Вернуться на сайт</a>
        </p>
      </div>
    </div>
    <script>
      if (localStorage.getItem('admin_token')) {
        window.location.href = '/admin/';
      }

      // Stored in-memory only (not localStorage)
      let _tempToken = null;

      function resetToLogin() {
        _tempToken = null;
        document.getElementById('totpPanel').style.display = 'none';
        document.getElementById('loginForm').style.display = '';
        document.getElementById('totpCode').value = '';
        document.getElementById('totpError').textContent = '';
        document.getElementById('loginBtn').disabled = false;
        document.getElementById('loginBtn').textContent = 'Войти';
      }

      document.getElementById('loginForm').addEventListener('submit', async e => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const err = document.getElementById('loginError');
        btn.disabled = true;
        btn.textContent = '⏳ Вход...';
        err.textContent = '';
        try {
          const res = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              username: document.getElementById('username').value,
              password: document.getElementById('password').value,
            }),
          });
          const data = await res.json();
          if (!res.ok) {
            err.textContent = data.error || 'Ошибка входа';
            btn.disabled = false;
            btn.textContent = 'Войти →';
            const box = document.getElementById('loginBox');
            box.classList.remove('shake');
            void box.offsetWidth;
            box.classList.add('shake');
            return;
          }
          if (data.requires_2fa) {
            // Store temp_token in memory, show 2FA panel
            _tempToken = data.temp_token;
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('totpPanel').style.display = '';
            document.getElementById('totpCode').focus();
            return;
          }
          // Normal login (no 2FA)
          localStorage.setItem('admin_token', data.token);
          localStorage.setItem('admin_user', JSON.stringify(data.admin));
          if (data.refresh_token) localStorage.setItem('admin_refresh_token', data.refresh_token);
          window.location.href = '/admin/';
        } catch {
          err.textContent = 'Ошибка соединения';
          btn.disabled = false;
          btn.textContent = 'Войти →';
        }
      });

      async function submitTotp() {
        const btn = document.getElementById('totpBtn');
        const err = document.getElementById('totpError');
        const code = document.getElementById('totpCode').value.trim();
        if (!code || code.length !== 6) {
          err.textContent = 'Введите 6-значный код';
          return;
        }
        btn.disabled = true;
        btn.textContent = '⏳ Проверка...';
        err.textContent = '';
        try {
          const res = await fetch('/api/auth/verify-totp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ temp_token: _tempToken, totp_code: code }),
          });
          const data = await res.json();
          if (!res.ok) {
            err.textContent = data.error || 'Неверный код';
            btn.disabled = false;
            btn.textContent = 'Подтвердить';
            const box = document.getElementById('loginBox');
            box.classList.remove('shake');
            void box.offsetWidth;
            box.classList.add('shake');
            return;
          }
          localStorage.setItem('admin_token', data.token);
          localStorage.setItem('admin_user', JSON.stringify(data.admin));
          if (data.refresh_token) localStorage.setItem('admin_refresh_token', data.refresh_token);
          window.location.href = '/admin/';
        } catch {
          err.textContent = 'Ошибка соединения';
          btn.disabled = false;
          btn.textContent = 'Подтвердить';
        }
      }

      // Allow pressing Enter in the TOTP input
      document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('totpCode').addEventListener('keydown', e => {
          if (e.key === 'Enter') submitTotp();
        });
      });
    </script>
  </body>
</html>
