    <style>
      /* ── cabinet page ── */
      .cabinet-page {
        min-height: 100vh;
        padding: 100px 0 80px;
      }

      /* ── search section ── */
      .cabinet-search-wrap {
        max-width: 560px;
        margin: 0 auto 48px;
        text-align: center;
      }
      .cabinet-search-wrap h1 {
        font-size: clamp(1.8rem, 4vw, 2.6rem);
        color: var(--white);
        margin-bottom: 10px;
      }
      .cabinet-search-wrap p {
        color: var(--text-dim);
        font-size: 0.88rem;
        margin-bottom: 28px;
      }
      .cabinet-search-row {
        display: flex;
        gap: 12px;
      }
      .cabinet-search-row .form-input {
        flex: 1;
        min-width: 0;
      }

      /* ── profile card ── */
      .cabinet-profile {
        display: flex;
        align-items: center;
        gap: 20px;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px 24px;
        margin-bottom: 28px;
      }

      /* avatar with gold ring */
      .cabinet-avatar {
        width: 68px;
        height: 68px;
        border-radius: 50%;
        flex-shrink: 0;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .cabinet-avatar::before {
        content: '';
        position: absolute;
        inset: -3px;
        border-radius: 50%;
        background: conic-gradient(var(--gold, #c9a96e) 0%, rgba(201, 169, 110, 0.2) 60%, var(--gold, #c9a96e) 100%);
        z-index: 0;
        animation: avatar-spin 8s linear infinite;
      }
      @media (prefers-reduced-motion: reduce) {
        .cabinet-avatar::before {
          animation: none;
        }
      }
      @keyframes avatar-spin {
        to {
          transform: rotate(360deg);
        }
      }
      .cabinet-avatar-inner {
        width: 62px;
        height: 62px;
        border-radius: 50%;
        background: var(--bg3);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Playfair Display', serif;
        font-size: 1.5rem;
        color: var(--gold);
        font-weight: 500;
        position: relative;
        z-index: 1;
        overflow: hidden;
      }
      .cabinet-avatar-inner img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center top;
        border-radius: 50%;
      }
      .cabinet-profile-info {
        flex: 1;
        min-width: 0;
      }
      .cabinet-profile-name {
        font-family: 'Playfair Display', serif;
        font-size: 1.25rem;
        color: var(--white);
        margin-bottom: 4px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .cabinet-profile-meta {
        font-size: 0.78rem;
        color: var(--text-dim);
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      .cabinet-profile-status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.78rem;
        margin-top: 6px;
      }
      .cabinet-profile-status::before {
        content: '';
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: currentColor;
        flex-shrink: 0;
      }
      .cabinet-profile-status.free {
        color: #4caf50;
      }
      .cabinet-profile-status.busy {
        color: #f44336;
      }

      /* ── notifications badge area ── */
      .cabinet-notif-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(201, 169, 110, 0.07);
        border: 1px solid rgba(201, 169, 110, 0.2);
        border-radius: 10px;
        padding: 10px 16px;
        margin-bottom: 24px;
        font-size: 0.85rem;
        color: var(--text-muted);
      }
      .cabinet-notif-icon {
        font-size: 1.1rem;
        position: relative;
        flex-shrink: 0;
      }
      .cabinet-notif-badge {
        position: absolute;
        top: -6px;
        right: -8px;
        background: var(--gold);
        color: var(--bg, #080808);
        font-size: 0.6rem;
        font-weight: 700;
        min-width: 16px;
        height: 16px;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 4px;
        line-height: 1;
      }
      .cabinet-notif-text {
        flex: 1;
      }
      .cabinet-notif-dismiss {
        background: none;
        border: none;
        color: var(--text-dim);
        cursor: pointer;
        font-size: 0.8rem;
        padding: 2px 6px;
        transition: color 0.2s;
      }
      .cabinet-notif-dismiss:hover {
        color: var(--gold);
      }

      /* ── stats cards ── */
      .cabinet-stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 14px;
        margin-bottom: 28px;
      }
      .cabinet-stat-card {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px 16px;
        text-align: center;
        position: relative;
        overflow: hidden;
        transition:
          border-color 0.25s,
          transform 0.25s;
      }
      .cabinet-stat-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--stat-color, var(--gold));
        opacity: 0.7;
      }
      .cabinet-stat-card:hover {
        border-color: var(--stat-color, var(--gold));
        transform: translateY(-2px);
      }
      @media (prefers-reduced-motion: reduce) {
        .cabinet-stat-card {
          transition: none;
        }
        .cabinet-stat-card:hover {
          transform: none;
        }
      }
      .cabinet-stat-icon {
        font-size: 1.4rem;
        margin-bottom: 8px;
        display: block;
      }
      .cabinet-stat-num {
        font-family: 'Playfair Display', serif;
        font-size: 2rem;
        font-weight: 700;
        color: var(--stat-color, var(--gold));
        line-height: 1;
        margin-bottom: 6px;
      }
      .cabinet-stat-label {
        font-size: 0.65rem;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--text-dim);
      }

      /* ── calendar / busy dates ── */
      .cabinet-calendar {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px 20px 16px;
        margin-bottom: 28px;
      }
      .cabinet-calendar-title {
        font-family: 'Playfair Display', serif;
        font-size: 1.05rem;
        color: var(--white);
        margin-bottom: 4px;
      }
      .cabinet-calendar-subtitle {
        font-size: 0.75rem;
        color: var(--text-dim);
        margin-bottom: 16px;
      }
      .cal-month-label {
        font-size: 0.7rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 8px;
        margin-top: 16px;
      }
      .cal-month-label:first-of-type {
        margin-top: 0;
      }
      .cal-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .cal-day {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.78rem;
        font-weight: 500;
        border: 1px solid transparent;
        transition: transform 0.15s;
        position: relative;
      }
      @media (prefers-reduced-motion: reduce) {
        .cal-day {
          transition: none;
        }
      }
      .cal-day.busy {
        background: rgba(244, 67, 54, 0.15);
        border-color: rgba(244, 67, 54, 0.35);
        color: #ef9a9a;
      }
      .cal-day.busy:hover {
        transform: scale(1.12);
      }
      .cal-day.free {
        background: rgba(76, 175, 80, 0.1);
        border-color: rgba(76, 175, 80, 0.25);
        color: #a5d6a7;
      }
      .cal-day.today {
        border-color: var(--gold);
        color: var(--gold);
        font-weight: 700;
      }
      .cal-legend {
        display: flex;
        gap: 16px;
        margin-top: 14px;
        font-size: 0.72rem;
        color: var(--text-dim);
      }
      .cal-legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .cal-legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 3px;
        flex-shrink: 0;
      }
      .cal-legend-dot.busy-dot {
        background: rgba(244, 67, 54, 0.5);
      }
      .cal-legend-dot.free-dot {
        background: rgba(76, 175, 80, 0.5);
      }
      .cal-legend-dot.today-dot {
        background: var(--gold);
        opacity: 0.7;
      }

      /* ── orders list ── */
      .cabinet-orders-title {
        font-family: 'Playfair Display', serif;
        font-size: 1.05rem;
        color: var(--white);
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .cabinet-orders-count {
        font-family: sans-serif;
        font-size: 0.72rem;
        background: rgba(201, 169, 110, 0.15);
        color: var(--gold);
        border-radius: 20px;
        padding: 2px 10px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      .order-card {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px 20px;
        margin-bottom: 12px;
        transition: border-color 0.2s;
        position: relative;
        overflow: hidden;
      }
      .order-card::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: var(--order-accent, var(--border));
        border-radius: 0;
      }
      .order-card:hover {
        border-color: rgba(201, 169, 110, 0.35);
      }
      @media (prefers-reduced-motion: reduce) {
        .order-card {
          transition: none;
        }
      }
      .order-card-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        gap: 8px;
        flex-wrap: wrap;
      }
      .order-number {
        font-family: 'Playfair Display', serif;
        font-size: 0.95rem;
        color: var(--white);
      }
      .order-status-badge {
        font-size: 0.7rem;
        letter-spacing: 1px;
        padding: 4px 12px;
        border-radius: 20px;
        font-weight: 500;
        white-space: nowrap;
      }
      .order-card-meta {
        font-size: 0.82rem;
        color: var(--text-dim);
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
      }
      .order-meta-item {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      /* status colour variants */
      .status-new {
        background: rgba(33, 150, 243, 0.12);
        color: #90caf9;
        --order-accent: #42a5f5;
      }
      .status-confirmed {
        background: rgba(76, 175, 80, 0.12);
        color: #a5d6a7;
        --order-accent: #66bb6a;
      }
      .status-in_progress {
        background: rgba(255, 193, 7, 0.12);
        color: #ffe082;
        --order-accent: #fdd835;
      }
      .status-completed {
        background: rgba(201, 169, 110, 0.15);
        color: var(--gold);
        --order-accent: var(--gold);
      }
      .status-cancelled {
        background: rgba(244, 67, 54, 0.1);
        color: #ef9a9a;
        --order-accent: #ef5350;
      }
      .status-reviewing {
        background: rgba(156, 39, 176, 0.12);
        color: #ce93d8;
        --order-accent: #ab47bc;
      }

      /* ── progress bar ── */
      .order-progress {
        display: flex;
        align-items: center;
        margin: 14px 0 4px;
        gap: 0;
      }
      .order-progress-step {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        flex: 1;
        position: relative;
      }
      .order-progress-step:not(:last-child)::after {
        content: '';
        position: absolute;
        top: 9px;
        left: 50%;
        width: 100%;
        height: 2px;
        background: var(--border);
        z-index: 0;
      }
      .order-progress-step.done:not(:last-child)::after {
        background: var(--gold);
      }
      .order-progress-dot {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 2px solid var(--border);
        background: var(--bg3, #111);
        position: relative;
        z-index: 1;
        flex-shrink: 0;
        transition:
          border-color 0.2s,
          background 0.2s;
      }
      .order-progress-step.done .order-progress-dot {
        background: var(--gold);
        border-color: var(--gold);
      }
      .order-progress-step.active .order-progress-dot {
        border-color: var(--gold);
        box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.25);
      }
      .order-progress-label {
        font-size: 0.58rem;
        letter-spacing: 0.5px;
        color: var(--text-dim);
        text-align: center;
        white-space: nowrap;
        line-height: 1.2;
      }
      .order-progress-step.done .order-progress-label,
      .order-progress-step.active .order-progress-label {
        color: var(--gold);
      }

      /* ── contract button ── */
      .btn-contract {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.75rem;
        color: var(--gold);
        border: 1px solid rgba(201, 169, 110, 0.35);
        border-radius: 8px;
        padding: 5px 12px;
        text-decoration: none;
        margin-top: 12px;
        transition:
          background 0.2s,
          border-color 0.2s;
      }
      .btn-contract:hover {
        background: rgba(201, 169, 110, 0.1);
        border-color: var(--gold);
      }

      /* ── avatar upload ── */
      .cabinet-avatar-upload {
        position: relative;
        flex-shrink: 0;
      }
      .avatar-upload-label {
        position: absolute;
        bottom: -2px;
        right: -2px;
        background: var(--gold);
        color: #080808;
        border-radius: 50%;
        width: 22px;
        height: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        cursor: pointer;
        z-index: 2;
        transition: transform 0.15s;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
      }
      .avatar-upload-label:hover {
        transform: scale(1.15);
      }
      #avatarInput {
        display: none;
      }

      /* ── loyalty section ── */
      .cabinet-loyalty {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px 24px;
        margin-bottom: 28px;
      }
      .cabinet-loyalty-title {
        font-family: 'Playfair Display', serif;
        font-size: 1.05rem;
        color: var(--white);
        margin-bottom: 16px;
      }
      .loyalty-balance {
        display: flex;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 16px;
      }
      .loyalty-balance-value {
        font-family: 'Playfair Display', serif;
        font-size: 2.4rem;
        font-weight: 700;
        color: var(--gold);
        line-height: 1;
      }
      .loyalty-balance-label {
        font-size: 0.9rem;
        color: var(--text-dim);
      }
      .loyalty-history-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        font-size: 0.82rem;
      }
      .loyalty-history-item:last-child {
        border-bottom: none;
      }
      .loyalty-history-desc {
        color: var(--text-dim);
        flex: 1;
        margin-right: 12px;
      }
      .loyalty-history-pts {
        font-weight: 600;
        white-space: nowrap;
      }
      .loyalty-history-pts.plus {
        color: #66bb6a;
      }
      .loyalty-history-pts.minus {
        color: #ef9a9a;
      }
      .loyalty-empty {
        color: var(--text-dim);
        font-size: 0.82rem;
        text-align: center;
        padding: 8px 0;
      }

      /* ── reviews section ── */
      .cabinet-reviews {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px 24px;
        margin-bottom: 28px;
      }
      .cabinet-reviews-title {
        font-family: 'Playfair Display', serif;
        font-size: 1.05rem;
        color: var(--white);
        margin-bottom: 16px;
      }
      .review-card {
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        padding: 12px 0;
      }
      .review-card:last-child {
        border-bottom: none;
      }
      .review-card-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
        gap: 8px;
        flex-wrap: wrap;

      .review-stars {
        color: var(--gold);
        font-size: 0.9rem;
        letter-spacing: 1px;
      }
      .review-date {

        color: var(--text-dim);

        color: var(--text-muted, #aaa);
        line-height: 1.5;
      }
      .review-author {
        font-size: 0.72rem;
        color: var(--text-dim);
        margin-top: 4px;

        padding: 48px 24px;
        color: var(--text-dim);
        font-size: 0.9rem;

        align-items: center;
        gap: 10px;
        color: var(--text-dim);
        font-size: 0.88rem;
        padding: 24px 0;
      }
      .cabinet-spinner {
        width: 18px;
        height: 18px;
        border: 2px solid var(--border);
        border-top-color: var(--gold);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        flex-shrink: 0;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .cabinet-spinner {
          animation: none;
          border-top-color: var(--gold);
        }
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Перейти к основному содержанию</a>
    <nav class="navbar">
      <div class="container">
        <a class="nav-logo" href="/">NEVESTY<span> MODELS</span></a>
      </div>
    </nav>

    <main class="cabinet-page" id="main-content">
      <div class="container">
        <!-- Search section -->
        <div class="cabinet-search-wrap">
          <div
            style="
              font-size: 0.7rem;
              letter-spacing: 3px;
              text-transform: uppercase;
              color: var(--gold);
              margin-bottom: 12px;
            "
          >
            Личный кабинет
          </div>
          <h1>Кабинет модели</h1>
          <p>Введите ваше имя для просмотра назначенных заявок и расписания</p>
          <div class="cabinet-search-row">
            <input
              id="modelNameInput"
              type="text"
              class="form-input"
              placeholder="Ваше имя..."
              autocomplete="name"
              aria-label="Имя модели"
            />
            <button onclick="searchOrders()" class="btn-primary" style="white-space: nowrap">Найти</button>
          </div>
        </div>

        <!-- Results area -->
        <div id="results" style="max-width: 700px; margin: 0 auto"></div>
      </div>
    </main>

    <script>
      const STATUS_LABELS = {
        new: '🆕 Новая',
        confirmed: '✅ Подтверждена',
        in_progress: '⚙️ В работе',
        completed: '🎉 Завершена',
        cancelled: '❌ Отменена',
        reviewing: '👀 На рассмотрении',
      };

      const STATUS_CSS = {
        new: 'status-new',
        confirmed: 'status-confirmed',
        in_progress: 'status-in_progress',
        completed: 'status-completed',
        cancelled: 'status-cancelled',
        reviewing: 'status-reviewing',
      };

      const ORDER_ACCENTS = {
        new: '#42a5f5',
        confirmed: '#66bb6a',
        in_progress: '#fdd835',
        completed: '#c9a96e',
        cancelled: '#ef5350',
        reviewing: '#ab47bc',
      };

      function esc(s) {
        if (s == null) return '';
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      /* ─── Initials from name ─── */
      function getInitials(name) {
        if (!name) return '✦';
        const parts = name.trim().split(/\s+/);
        if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
        return parts[0].slice(0, 2).toUpperCase();
      }

      /* ─── Profile header ─── */
      function buildProfile(model, name) {
        const initials = getInitials(model?.name || name);
        const avatarSrc = model?.id ? `/uploads/avatars/${model.id}.jpg` : null;
        const photoHtml = model?.photo_main
          ? `<img src="${esc(model.photo_main)}" alt="${esc(model.name || name)}" loading="lazy" decoding="async" />`
          : avatarSrc
            ? `<img src="${esc(avatarSrc)}" alt="${esc(model?.name || name)}" loading="lazy" decoding="async" onerror="this.style.display='none'" />`
            : initials;
        const statusCls = model?.available ? 'free' : 'busy';
        const statusTxt = model?.available ? 'Свободна' : 'Занята';
        const metaParts = [];
        if (model?.city) metaParts.push(esc(model.city));
        if (model?.category) {
          const cats = { fashion: 'Fashion', commercial: 'Commercial', events: 'Events' };
          metaParts.push(cats[model.category] || esc(model.category));
        }
        const uploadWidget = model?.id
          ? `
          <div class="cabinet-avatar-upload">
            <div class="cabinet-avatar" id="profileAvatar">
              <div class="cabinet-avatar-inner" id="profileAvatarInner">${photoHtml}</div>
            </div>
            <label class="avatar-upload-label" title="Изменить фото" aria-label="Изменить фото профиля">
              ✏️
              <input type="file" id="avatarInput" accept="image/*" onchange="uploadAvatar(this, ${model.id})" />
            </label>
          </div>`
          : `
          <div class="cabinet-avatar">
            <div class="cabinet-avatar-inner">${photoHtml}</div>
          </div>`;
        return `
          <div class="cabinet-profile">
            ${uploadWidget}
            <div class="cabinet-profile-info">
              <div class="cabinet-profile-name">${esc(model?.name || name)}</div>
              ${metaParts.length ? `<div class="cabinet-profile-meta">${metaParts.join(' · ')}</div>` : ''}
              ${model ? `<div class="cabinet-profile-status ${statusCls}">${statusTxt}</div>` : ''}
            </div>
          </div>`;
      }

      /* ─── Notifications bar ─── */
      function buildNotifBar(orders) {
        const newCount = orders.filter(o => o.status === 'new' || o.status === 'reviewing').length;
        if (!newCount) return '';
        return `
          <div class="cabinet-notif-bar" id="notifBar" role="alert" aria-live="polite">
            <span class="cabinet-notif-icon" aria-hidden="true">
              🔔
              <span class="cabinet-notif-badge" aria-label="${newCount} непрочитанных">${newCount}</span>
            </span>
            <span class="cabinet-notif-text">
              У вас <strong>${newCount}</strong> ${newCount === 1 ? 'новая заявка' : 'новых заявок'} — требует вашего внимания
            </span>
            <button class="cabinet-notif-dismiss" onclick="document.getElementById('notifBar').remove()" aria-label="Закрыть уведомление">✕</button>
          </div>`;
      }

      /* ─── Stats cards ─── */
      function buildStats(orders) {
        const total = orders.length;
        const confirmed = orders.filter(o => ['confirmed', 'in_progress'].includes(o.status)).length;
        const completed = orders.filter(o => o.status === 'completed').length;
        const cancelled = orders.filter(o => o.status === 'cancelled').length;

        return `
          <div class="cabinet-stats" role="list" aria-label="Статистика заявок">
            <div class="cabinet-stat-card" style="--stat-color:#c9a96e" role="listitem">
              <span class="cabinet-stat-icon" aria-hidden="true">📋</span>
              <div class="cabinet-stat-num">${total}</div>
              <div class="cabinet-stat-label">Всего заявок</div>
            </div>
            <div class="cabinet-stat-card" style="--stat-color:#66bb6a" role="listitem">
              <span class="cabinet-stat-icon" aria-hidden="true">✅</span>
              <div class="cabinet-stat-num">${confirmed}</div>
              <div class="cabinet-stat-label">В работе</div>
            </div>
            <div class="cabinet-stat-card" style="--stat-color:#fdd835" role="listitem">
              <span class="cabinet-stat-icon" aria-hidden="true">🎉</span>
              <div class="cabinet-stat-num">${completed}</div>
              <div class="cabinet-stat-label">Завершено</div>
            </div>
            <div class="cabinet-stat-card" style="--stat-color:#ef5350" role="listitem">
              <span class="cabinet-stat-icon" aria-hidden="true">❌</span>
              <div class="cabinet-stat-num">${cancelled}</div>
              <div class="cabinet-stat-label">Отклонено</div>
            </div>
          </div>`;
      }

      /* ─── Calendar grid ─── */
      function buildCalendar(busyDates) {
        const today = new Date();
        const todayStr = today.toISOString().slice(0, 10);
        const busySet = new Set(busyDates);

        // Build months: current + next
        function buildMonth(year, month) {
          const daysInMonth = new Date(year, month + 1, 0).getDate();
          const monthName = new Date(year, month, 1).toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' });
          let daysHtml = '';
          for (let d = 1; d <= daysInMonth; d++) {
            const ds = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const isPast = ds < todayStr;
            const isBusy = busySet.has(ds);
            const isToday = ds === todayStr;
            if (isPast) {
              daysHtml += `<div class="cal-day" style="opacity:0.25;color:var(--text-dim)">${d}</div>`;
            } else if (isBusy) {
              daysHtml += `<div class="cal-day busy" title="Занято: ${ds}" aria-label="Занято ${ds}">${d}</div>`;
            } else if (isToday) {
              daysHtml += `<div class="cal-day today" title="Сегодня" aria-label="Сегодня">${d}</div>`;
            } else {
              daysHtml += `<div class="cal-day free" title="Свободно: ${ds}" aria-label="Свободно ${ds}">${d}</div>`;
            }
          }
          return `
            <div class="cal-month-label">${monthName.charAt(0).toUpperCase() + monthName.slice(1)}</div>
            <div class="cal-grid" role="grid" aria-label="${monthName}">${daysHtml}</div>`;
        }

        const m1Html = buildMonth(today.getFullYear(), today.getMonth());
        const next = new Date(today.getFullYear(), today.getMonth() + 1, 1);
        const m2Html = buildMonth(next.getFullYear(), next.getMonth());

        return `
          <div class="cabinet-calendar" aria-label="Календарь занятости">
            <div class="cabinet-calendar-title">📅 Мои занятые даты</div>
            <div class="cabinet-calendar-subtitle">Текущий и следующий месяц</div>
            ${m1Html}
            ${m2Html}
            <div class="cal-legend" aria-hidden="true">
              <div class="cal-legend-item"><div class="cal-legend-dot busy-dot"></div> Занято</div>
              <div class="cal-legend-item"><div class="cal-legend-dot free-dot"></div> Свободно</div>
              <div class="cal-legend-item"><div class="cal-legend-dot today-dot"></div> Сегодня</div>
            </div>
          </div>`;
      }

      /* ─── Order progress bar ─── */
      const PROGRESS_STEPS = [
        { key: 'new', label: 'Получена' },
        { key: 'confirmed', label: 'Подтверждена' },
        { key: 'in_progress', label: 'В работе' },
        { key: 'completed', label: 'Завершена' },
      ];
      const PROGRESS_ORDER = { new: 0, reviewing: 0, confirmed: 1, in_progress: 2, completed: 3 };

      function buildProgressBar(status) {
        if (status === 'cancelled') return '';
        const currentIdx = PROGRESS_ORDER[status] ?? -1;
        const steps = PROGRESS_STEPS.map((step, i) => {
          const isDone = i < currentIdx;
          const isActive = i === currentIdx;
          const cls = isDone ? 'done' : isActive ? 'active' : '';
          return `
            <div class="order-progress-step ${cls}" aria-label="${step.label}${isDone ? ' — выполнено' : isActive ? ' — текущий' : ''}">
              <div class="order-progress-dot"></div>
              <div class="order-progress-label">${step.label}</div>
            </div>`;
        }).join('');
        return `<div class="order-progress" role="progressbar" aria-label="Прогресс заявки">${steps}</div>`;
      }

      /* ─── Order card ─── */
      function buildOrderCard(o) {
        const statusLabel = STATUS_LABELS[o.status] || esc(o.status);
        const statusCls = STATUS_CSS[o.status] || '';
        const accent = ORDER_ACCENTS[o.status] || 'var(--border)';
        const dateStr = o.event_date
          ? new Date(o.event_date).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' })
          : null;
        const progressHtml = buildProgressBar(o.status);
        const contractHtml =
          ['confirmed', 'completed'].includes(o.status) && o.id
            ? `<a href="/api/admin/orders/${esc(o.id)}/contract.html" target="_blank" rel="noopener noreferrer" class="btn-contract">📄 Посмотреть договор</a>`
            : '';
        return `
          <div class="order-card" style="--order-accent:${accent}">
            <div class="order-card-top">
              <div class="order-number">#${esc(o.order_number || o.id)}</div>
              <span class="order-status-badge ${statusCls}" aria-label="Статус: ${esc(statusLabel)}">${esc(statusLabel)}</span>
            </div>
            <div class="order-card-meta">
              ${o.event_type ? `<span class="order-meta-item">🎭 ${esc(o.event_type)}</span>` : ''}
              ${dateStr ? `<span class="order-meta-item">📅 ${esc(dateStr)}</span>` : ''}
              ${o.client_name ? `<span class="order-meta-item">👤 ${esc(o.client_name)}</span>` : ''}
            </div>
            ${progressHtml}
            ${contractHtml}
          </div>`;
      }

      /* ─── Build loyalty section ─── */
      function buildLoyalty(loyaltyData, orders) {
        // Try to get balance from loyalty data, fallback to orders count
        const balance = loyaltyData?.balance ?? orders.filter(o => o.status === 'completed').length * 50;
        const history = loyaltyData?.history || [];
        const historyHtml = history.length
          ? history
              .slice(0, 5)
              .map(h => {
                const pts =
                  h.points > 0
                    ? `<span class="loyalty-history-pts plus">+${h.points}</span>`
                    : `<span class="loyalty-history-pts minus">${h.points}</span>`;
                const dateStr = h.created_at
                  ? new Date(h.created_at).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' })
                  : '';
                return `
                <div class="loyalty-history-item">
                  <span class="loyalty-history-desc">${esc(h.description || 'Операция')}</span>
                  <span style="font-size:0.72rem;color:var(--text-dim);margin-right:10px">${esc(dateStr)}</span>
                  ${pts}
                </div>`;
              })
              .join('')
          : `<div class="loyalty-empty">История операций пуста</div>`;
        return `
          <section class="cabinet-loyalty" id="loyalty-section" aria-label="Бонусные баллы">
            <div class="cabinet-loyalty-title">⭐ Бонусные баллы</div>
            <div class="loyalty-balance">
              <span class="loyalty-balance-value" id="loyaltyBalance">${balance}</span>
              <span class="loyalty-balance-label">баллов</span>
            </div>
            <div id="loyaltyHistory">${historyHtml}</div>
          </section>`;
      }

      /* ─── Build reviews section ─── */
      function buildReviews(reviews) {
        const title = `<div class="cabinet-reviews-title">💬 Мои отзывы</div>`;
        if (!reviews || !reviews.length) {
          return `
            <section class="cabinet-reviews" id="reviews-section" aria-label="Мои отзывы">
              ${title}
              <div class="loyalty-empty">Отзывов пока нет</div>
            </section>`;
        }
        const stars = n =>
          '★'.repeat(Math.max(0, Math.min(5, n || 0))) + '☆'.repeat(5 - Math.max(0, Math.min(5, n || 0)));
        const reviewsHtml = reviews
          .slice(0, 10)
          .map(r => {
            const dateStr = r.created_at
              ? new Date(r.created_at).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' })
              : '';
            return `
            <div class="review-card">
              <div class="review-card-top">
                <span class="review-stars" aria-label="${r.rating || 0} из 5 звёзд">${stars(r.rating)}</span>
                <span class="review-date">${esc(dateStr)}</span>
              </div>
              ${r.text ? `<div class="review-text">${esc(r.text)}</div>` : ''}
              ${r.client_name ? `<div class="review-author">— ${esc(r.client_name)}</div>` : ''}
            </div>`;
          })
          .join('');
        return `
          <section class="cabinet-reviews" id="reviews-section" aria-label="Мои отзывы">
            ${title}
            ${reviewsHtml}
          </section>`;
      }

      /* ─── Avatar upload ─── */
      async function uploadAvatar(input, modelId) {
        if (!input.files || !input.files[0]) return;
        const file = input.files[0];
        if (file.size > 5 * 1024 * 1024) {
          alert('Файл слишком большой (макс. 5 МБ)');
          return;
        }
        const formData = new FormData();
        formData.append('avatar', file);
        formData.append('model_id', modelId);
        try {
          const r = await fetch('/api/client/avatar', { method: 'POST', body: formData });
          if (r.ok) {
            const d = await r.json();
            const inner = document.getElementById('profileAvatarInner');
            if (inner) {
              const url = d.url || URL.createObjectURL(file);
              inner.innerHTML = `<img src="${esc(url)}" alt="Аватар" style="width:100%;height:100%;object-fit:cover;border-radius:50%" />`;
            }
          } else {
            alert('Ошибка загрузки фото. Попробуйте позже.');
          }
        } catch {
          alert('Ошибка сети. Попробуйте позже.');
        }
      }

      /* ─── Main search ─── */
      async function searchOrders() {
        const name = document.getElementById('modelNameInput').value.trim();
        if (!name) return;

        const res = document.getElementById('results');
        res.innerHTML = `
          <div class="cabinet-loading" aria-live="polite">
            <div class="cabinet-spinner" aria-hidden="true"></div>
            Загрузка данных...
          </div>`;

        try {
          const r = await fetch(`/api/models/my-orders?name=${encodeURIComponent(name)}`);
          const d = await r.json();

          if (!d.orders || !d.orders.length) {
            res.innerHTML = `
              ${buildProfile(d.model, name)}
              <div class="cabinet-empty">
                <div style="font-size:2rem;margin-bottom:12px;opacity:0.4">📭</div>
                <p>${esc(d.message) || 'Заявки не найдены'}</p>
              </div>`;
            return;
          }

          // Load availability, loyalty, reviews in parallel
          const modelId = d.model?.id;
          let busyDates = [];
          let loyaltyData = null;
          let reviewsData = [];

          const parallelFetches = [];

          if (modelId) {
            const today = new Date();
            const todayStr = today.toISOString().slice(0, 10);
            const nowMonth = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
            const nextDate = new Date(today.getFullYear(), today.getMonth() + 1, 1);
            const nextMonth = `${nextDate.getFullYear()}-${String(nextDate.getMonth() + 1).padStart(2, '0')}`;

            parallelFetches.push(
              Promise.all([
                fetch(`/api/models/${modelId}/availability?month=${nowMonth}`).then(x => x.json()),
                fetch(`/api/models/${modelId}/availability?month=${nextMonth}`).then(x => x.json()),
              ])
                .then(([r1, r2]) => {
                  busyDates = [...(r1.busy_dates || []), ...(r2.busy_dates || [])].filter(dt => dt >= todayStr);
                })
                .catch(() => {}),

              fetch(`/api/client/loyalty?name=${encodeURIComponent(name)}`)
                .then(x => (x.ok ? x.json() : null))
                .then(ld => {
                  loyaltyData = ld;
                })
                .catch(() => {}),

              fetch(`/api/client/reviews?name=${encodeURIComponent(name)}`)
                .then(x => (x.ok ? x.json() : null))
                .then(rd => {
                  reviewsData = rd?.reviews || [];
                })
                .catch(() => {})
            );
          }

          await Promise.all(parallelFetches);

          const notifHtml = buildNotifBar(d.orders);
          const profileHtml = buildProfile(d.model, name);
          const statsHtml = buildStats(d.orders);
          const calHtml = buildCalendar(busyDates);
          const loyaltyHtml = buildLoyalty(loyaltyData, d.orders);
          const reviewsHtml = buildReviews(reviewsData);
          const ordersHtml = d.orders.map(buildOrderCard).join('');

          res.innerHTML = `
            ${profileHtml}
            ${notifHtml}
            ${statsHtml}
            ${loyaltyHtml}
            ${calHtml}
            <div class="cabinet-orders-title">
              Мои заявки
              <span class="cabinet-orders-count">${esc(d.total)}</span>
            </div>
            ${ordersHtml}
            ${reviewsHtml}`;
        } catch {
          res.innerHTML = `
            <div class="cabinet-empty" role="alert">
              <div style="font-size:2rem;margin-bottom:12px;opacity:0.4">⚠️</div>
              <p style="color:#ef9a9a">Ошибка загрузки. Попробуйте позже.</p>
            </div>`;
        }
      }

      document.getElementById('modelNameInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') searchOrders();
      });
    </script>
  </body>
</html>
