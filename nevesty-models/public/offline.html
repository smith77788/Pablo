<html lang="ru">
  <head>
    <meta charset="UTF-8" />

    <meta property="og:description" content="Нет подключения к интернету. Проверьте соединение и попробуйте снова." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Nevesty Models" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Нет подключения — Nevesty Models" />

    <meta name="theme-color" content="#080808" />
    <link rel="manifest" href="/manifest.json" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #080808;
        color: #e8e0d5;
        font-family:
          'Segoe UI',
          system-ui,
          -apple-system,
          sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .container {
        max-width: 480px;
        width: 100%;
        text-align: center;
      }

      .logo {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: 0.15em;
        color: #c9a96e;
        text-transform: uppercase;
        margin-bottom: 40px;
      }

      /* ── Animated no-signal icon ── */
      .icon-wrap {
        width: 96px;
        height: 96px;
        margin: 0 auto 28px;
        position: relative;
      }

      /* Signal bars that fade in/out to simulate bad connection */
      .icon-wrap svg {
        width: 100%;
        height: 100%;
        filter: drop-shadow(0 0 12px rgba(201, 169, 110, 0.25));
      }

      /* Interference flicker on the whole icon */
      .icon-signal {
        animation: flicker 3.5s ease-in-out infinite;
      }

      @keyframes flicker {
        0% {
          opacity: 0.55;
          transform: translateX(0);
        }
        5% {
          opacity: 0.9;
          transform: translateX(-1px);
        }
        10% {
          opacity: 0.4;
          transform: translateX(1px);
        }
        15% {
          opacity: 0.85;
          transform: translateX(0);
        }
        20% {
          opacity: 0.55;
          transform: translateX(0);
        }
        80% {
          opacity: 0.55;
          transform: translateX(0);
        }
        85% {
          opacity: 0.8;
          transform: translateX(1px);
        }
        90% {
          opacity: 0.35;
          transform: translateX(-1px);
        }
        95% {
          opacity: 0.75;
          transform: translateX(0);
        }
        100% {
          opacity: 0.55;
          transform: translateX(0);
        }
      }

      /* Individual bar animations staggered */
      .bar-1 {
        animation: barPulse 2.2s ease-in-out 0s infinite;
      }
      .bar-2 {
        animation: barPulse 2.2s ease-in-out 0.3s infinite;
      }
      .bar-3 {
        animation: barPulse 2.2s ease-in-out 0.6s infinite;
      }
      .bar-4 {
        animation: barPulse 2.2s ease-in-out 0.9s infinite;
      }

      @keyframes barPulse {
        0%,
        100% {
          opacity: 0.15;
        }
        40% {
          opacity: 0.9;
        }
        60% {
          opacity: 0.7;
        }
      }

      /* Animated waves under the icon */
      .waves-wrap {
        width: 120px;
        height: 28px;
        margin: -8px auto 24px;
        overflow: hidden;
      }

      .wave-path-1 {
        animation: waveDrift 2s ease-in-out 0s infinite alternate;
      }
      .wave-path-2 {
        animation: waveDrift 2s ease-in-out 0.4s infinite alternate-reverse;
      }
      .wave-path-3 {
        animation: waveDrift 2s ease-in-out 0.8s infinite alternate;
      }

      @keyframes waveDrift {
        from {
          transform: translateX(-8px);
          opacity: 0.25;
        }
        to {
          transform: translateX(8px);
          opacity: 0.6;
        }
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        color: #ffffff;
        margin-bottom: 12px;
      }

      p {
        font-size: 0.95rem;
        color: #999;
        line-height: 1.6;
        margin-bottom: 32px;
      }

      .btn-retry {
        display: inline-block;
        padding: 14px 36px;
        background: #c9a96e;
        color: #080808;
        font-size: 0.95rem;
        font-weight: 600;
        text-decoration: none;
        border: none;
        cursor: pointer;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        transition:
          background 0.2s,
          transform 0.15s;
        margin-bottom: 40px;
        border-radius: 4px;
      }

      .btn-retry:hover {
        background: #d4b87e;
        transform: translateY(-1px);
      }
      .btn-retry:active {
        transform: translateY(0);
      }

      /* ── Recent pages ── */
      .recent-section {
        text-align: left;
        border-top: 1px solid #1c1c1c;
        padding-top: 28px;
      }

      .recent-title {
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #c9a96e;
        margin-bottom: 14px;
        opacity: 0.75;
      }

      .recent-list {
        list-style: none;
      }

      .recent-list li {
        border-bottom: 1px solid #131313;
      }

      .recent-list a {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 0;
        color: #c9a96e;
        text-decoration: none;
        font-size: 0.88rem;
        transition:
          color 0.2s,
          padding-left 0.2s;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .recent-list a:hover {
        color: #d4b87e;
        padding-left: 4px;
      }

      .recent-list a::before {
        content: '';
        display: inline-block;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #c9a96e;
        flex-shrink: 0;
        opacity: 0.5;
      }

      .recent-list-title {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .recent-list-time {
        font-size: 0.72rem;
        color: #555;
        flex-shrink: 0;
      }

      .no-recent {
        font-size: 0.85rem;
        color: #555;
        font-style: italic;
        text-align: left;
      }

      .footer-note {
        margin-top: 32px;
        font-size: 0.75rem;
        color: #333;
        text-align: center;
      }

      /* ── Reduced motion ── */
      @media (prefers-reduced-motion: reduce) {
        .icon-signal,
        .bar-1,
        .bar-2,
        .bar-3,
        .bar-4,
        .wave-path-1,
        .wave-path-2,
        .wave-path-3 {
          animation: none;
          opacity: 0.5;
        }
      }
    </style>
    <!-- Google Analytics 4 (loads only if consent given) -->
    <script>
      window._ga_id = '';
      fetch('/api/settings/public')
        .then(r => r.json())
        .then(d => {
          if (!d.ga_measurement_id) return;
          if (localStorage.getItem('cookie_consent') !== 'accepted') return;
          window._ga_id = d.ga_measurement_id;
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=' + d.ga_measurement_id;
          document.head.appendChild(s);
          window.dataLayer = window.dataLayer || [];
          function gtag() {
            dataLayer.push(arguments);
          }
          window.gtag = gtag;
          gtag('js', new Date());
          gtag('config', d.ga_measurement_id, { send_page_view: true });
          window._ga_ready = true;
        })
        .catch(() => {});
    </script>
    <!-- Yandex.Metrica (loads only if consent given) -->
    <script>
      fetch('/api/settings/public')
        .then(r => r.json())
        .then(d => {
          if (!d.ym_counter_id) return;
          if (localStorage.getItem('cookie_consent') !== 'accepted') return;
          (function (m, e, t, r, i, k, a) {
            m[i] =
              m[i] ||
              function () {
                (m[i].a = m[i].a || []).push(arguments);
              };
            m[i].l = 1 * new Date();
            for (var j = 0; j < document.scripts.length; j++) {
              if (document.scripts[j].src === r) {
                return;
              }
            }
            ((k = e.createElement(t)),
              (a = e.getElementsByTagName(t)[0]),
              (k.async = 1),
              (k.src = r),
              a.parentNode.insertBefore(k, a));
          })(window, document, 'script', 'https://mc.yandex.ru/metrika/tag.js', 'ym');
          window.YM_ID = d.ym_counter_id;
          ym(d.ym_counter_id, 'init', { clickmap: true, trackLinks: true, accurateTrackBounce: true, webvisor: false });
        })
        .catch(() => {});
    </script>
    <script src="/js/analytics.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="logo">Nevesty Models</div>

      <!-- Animated no-signal icon with flickering bars -->
      <div class="icon-wrap" aria-hidden="true">
        <svg class="icon-signal" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- WiFi-style arcs — broken signal rings -->
          <path
            d="M20 56 Q48 30 76 56"
            stroke="#C9A96E"
            stroke-width="2.5"
            fill="none"
            stroke-linecap="round"
            class="bar-4"
          />
          <path
            d="M28 64 Q48 46 68 64"
            stroke="#C9A96E"
            stroke-width="2.5"
            fill="none"
            stroke-linecap="round"
            class="bar-3"
          />
          <path
            d="M36 72 Q48 62 60 72"
            stroke="#C9A96E"
            stroke-width="2.5"
            fill="none"
            stroke-linecap="round"
            class="bar-2"
          />
          <!-- Center dot -->
          <circle cx="48" cy="78" r="3.5" fill="#C9A96E" class="bar-1" />
          <!-- Cross / X overlay to indicate disconnected -->
          <line
            x1="30"
            y1="28"
            x2="66"
            y2="64"
            stroke="#c9614e"
            stroke-width="2"
            stroke-linecap="round"
            opacity="0.7"
          />
          <line
            x1="66"
            y1="28"
            x2="30"
            y2="64"
            stroke="#c9614e"
            stroke-width="2"
            stroke-linecap="round"
            opacity="0.7"
          />
        </svg>
      </div>

      <!-- Animated interference waves -->
      <div class="waves-wrap" aria-hidden="true">
        <svg viewBox="0 0 120 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            class="wave-path-1"
            d="M0 14 Q15 6 30 14 Q45 22 60 14 Q75 6 90 14 Q105 22 120 14"
            stroke="#C9A96E"
            stroke-width="1.5"
            fill="none"
            stroke-linecap="round"
            opacity="0.3"
          />
          <path
            class="wave-path-2"
            d="M0 18 Q15 10 30 18 Q45 26 60 18 Q75 10 90 18 Q105 26 120 18"
            stroke="#C9A96E"
            stroke-width="1"
            fill="none"
            stroke-linecap="round"
            opacity="0.2"
          />
          <path
            class="wave-path-3"
            d="M0 10 Q15 2 30 10 Q45 18 60 10 Q75 2 90 10 Q105 18 120 10"
            stroke="#9a7840"
            stroke-width="1"
            fill="none"
            stroke-linecap="round"
            opacity="0.15"
          />
        </svg>
      </div>

      <h1>Нет подключения к сети</h1>
      <p>Проверьте интернет-соединение и попробуйте снова.<br />Ранее просмотренные страницы доступны ниже.</p>

      <button class="btn-retry" onclick="window.location.reload()">Повторить</button>

      <div class="recent-section" id="recent-section" style="display: none">
        <p class="recent-title">Недавно просмотренные</p>
        <ul class="recent-list" id="recent-list"></ul>
      </div>

      <p class="no-recent" id="no-recent" style="display: none">История просмотров пуста.</p>

      <p class="footer-note">© <span id="yr"></span> Nevesty Models</p>
      <script>
        document.getElementById('yr').textContent = new Date().getFullYear();
      </script>
    </div>

    <script>
      // Auto-reload when connection is restored
      window.addEventListener('online', () => location.reload());

      (function () {
        try {
          var raw = localStorage.getItem('nm_recent_pages');
          var pages = raw ? JSON.parse(raw) : [];

          if (pages.length > 0) {
            var section = document.getElementById('recent-section');
            var list = document.getElementById('recent-list');
            section.style.display = 'block';

            pages.slice(0, 6).forEach(function (page) {
              var url = page.url || page;
              var title = page.title || url;
              var ts = page.ts ? new Date(page.ts) : null;

              var li = document.createElement('li');
              var a = document.createElement('a');
              a.href = url;
              a.title = title;

              var titleSpan = document.createElement('span');
              titleSpan.className = 'recent-list-title';
              titleSpan.textContent = title;
              a.appendChild(titleSpan);

              if (ts && !isNaN(ts)) {
                var timeSpan = document.createElement('span');
                timeSpan.className = 'recent-list-time';
                var now = Date.now();
                var diff = now - ts.getTime();
                var mins = Math.floor(diff / 60000);
                var hrs = Math.floor(diff / 3600000);
                var days = Math.floor(diff / 86400000);
                if (mins < 1) timeSpan.textContent = 'только что';
                else if (mins < 60) timeSpan.textContent = mins + ' мин';
                else if (hrs < 24) timeSpan.textContent = hrs + ' ч';
                else timeSpan.textContent = days + ' д';
                a.appendChild(timeSpan);
              }

              li.appendChild(a);
              list.appendChild(li);
            });
          } else {
            document.getElementById('no-recent').style.display = 'block';
          }
        } catch (e) {
          document.getElementById('no-recent').style.display = 'block';
        }
      })();
    </script>
  </body>
</html>
