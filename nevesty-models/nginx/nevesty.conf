# ---------------------------------------------------------------------------
# Rate-limiting zones (defined at http level via include; nginx reads this
# file inside an http{} block, so limit_req_zone is valid here only when
# nginx.conf wraps it.  If using plain conf.d/ drop-in, move these two lines
# to the main nginx.conf http{} block and remove them from here.
# ---------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=nevesty_api:10m    rate=60r/m;
limit_req_zone $binary_remote_addr zone=nevesty_auth:10m   rate=5r/m;
limit_req_zone $binary_remote_addr zone=nevesty_upload:10m rate=10r/m;

upstream nevesty_app {
    server app:3000;
    keepalive 32;
}

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect (port 80)
# Certbot ACME challenge is served from /var/www/certbot before the redirect.
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name nevesty-models.ru www.nevesty-models.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS server (port 443)
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name nevesty-models.ru www.nevesty-models.ru;

    # --- TLS ------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/nevesty-models.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nevesty-models.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # --- Security headers -----------------------------------------------------
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options     "nosniff"                                       always;
    add_header X-Frame-Options            "DENY"                                          always;
    add_header X-XSS-Protection           "1; mode=block"                                 always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' wss:; font-src 'self'; frame-ancestors 'none';" always;

    # --- Upload size ----------------------------------------------------------
    # Default for most requests
    client_max_body_size 10M;

    # --- Gzip -----------------------------------------------------------------
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 5;
    gzip_proxied    any;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml application/font-woff2;

    # --- Health check — no rate limit, no auth --------------------------------
    location = /api/health {
        proxy_pass         http://nevesty_app;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         Cache-Control "no-store";
        access_log         off;
    }

    # --- Auth endpoints — strict rate limit -----------------------------------
    location ~ ^/api/(auth|login|register) {
        limit_req  zone=nevesty_auth burst=5 nodelay;
        proxy_pass http://nevesty_app;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
        add_header         Cache-Control "no-store";
    }

    # --- File upload endpoints — extended body size + rate limit --------------
    location ~ ^/api/admin/(models|photos|upload) {
        limit_req              zone=nevesty_upload burst=5 nodelay;
        client_max_body_size   50M;
        proxy_pass             http://nevesty_app;
        proxy_http_version     1.1;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     120s;
        proxy_request_buffering off;
        add_header             Cache-Control "no-store";
    }

    # --- API — rate limited, no cache -----------------------------------------
    location /api/ {
        limit_req  zone=nevesty_api burst=30 nodelay;
        proxy_pass http://nevesty_app;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        add_header         Cache-Control "no-store";
    }

    # --- WebSocket (real-time order updates) ----------------------------------
    location /ws {
        proxy_pass         http://nevesty_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- Static assets — 30-day cache -----------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webp)$ {
        proxy_pass         http://nevesty_app;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        expires            30d;
        add_header         Cache-Control "public, max-age=2592000, immutable";
        access_log         off;
    }

    # --- Everything else ------------------------------------------------------
    location / {
        proxy_pass         http://nevesty_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
