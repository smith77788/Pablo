version: '3.8'

services:
  app:
    build: .
    container_name: nevesty-models
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
      - db_data:/app/data.db
      - backup_data:/app/backup
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  uploads_data:
  db_data:
  backup_data:
