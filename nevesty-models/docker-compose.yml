version: '3.9'

services:
  app:
    build: .
    container_name: nevesty-app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/nevesty.db
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
      - db_data:/app/data
      - backups_data:/app/backups
      - logs_data:/app/logs
    deploy:
      resources:
        limits:
          memory: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - nevesty-net

  redis:
    image: redis:7-alpine
    container_name: nevesty-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nevesty-net
    deploy:
      resources:
        limits:
          memory: 128m

  factory:
    build:
      context: ../
      dockerfile: factory/Dockerfile
    container_name: nevesty-factory
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - FACTORY_DB_PATH=/app/factory-data/factory.db
    volumes:
      - db_data:/app/nevesty-models/data:ro
      - factory_data:/app/factory-data
      - logs_data:/app/logs
    deploy:
      resources:
        limits:
          memory: 384m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python3", "-c", "import os, sys; p=os.environ.get('FACTORY_DB_PATH','/app/factory/factory.db'); sys.exit(0 if os.path.exists(p) else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - nevesty-net
    depends_on:
      app:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    container_name: nevesty-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nevesty.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - nevesty-net
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  certbot:
    image: certbot/certbot
    container_name: nevesty-certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    profiles:
      - ssl
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

networks:
  nevesty-net:
    driver: bridge

volumes:
  uploads_data:
  db_data:
  backups_data:
  logs_data:
  factory_data:
  redis_data:
  certbot_data:
  certbot_www:
