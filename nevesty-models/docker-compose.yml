version: '3.8'

services:
  app:
    build: .
    container_name: nevesty-app
    restart: always
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/nevesty.db
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
      - db_data:/app/data
      - backups_data:/app/backups
      - logs_data:/app/logs
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - nevesty-net

  factory:
    build:
      context: ../
      dockerfile: factory/Dockerfile
    container_name: nevesty-factory
    restart: always
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - FACTORY_DB_PATH=/app/factory-data/factory.db
    volumes:
      - db_data:/app/nevesty-models/data:ro
      - factory_data:/app/factory-data
      - logs_data:/app/logs
    deploy:
      resources:
        limits:
          memory: 384m
    healthcheck:
      test: ["CMD", "python3", "-c", "import os, sys; p=os.environ.get('FACTORY_DB_PATH','/app/factory/factory.db'); sys.exit(0 if os.path.exists(p) else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - nevesty-net
    depends_on:
      app:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    container_name: nevesty-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nevesty.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - nevesty-net
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  certbot:
    image: certbot/certbot
    container_name: nevesty-certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    profiles:
      - ssl
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

networks:
  nevesty-net:
    driver: bridge

volumes:
  uploads_data:
  db_data:
  backups_data:
  logs_data:
  factory_data:
  certbot_data:
  certbot_www:
