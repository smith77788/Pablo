version: '3.8'

services:
  app:
    build: .
    container_name: nevesty-app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
      - db_data:/app/data.db
      - backup_data:/app/backup
      - logs_data:/app/logs
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - nevesty-net

  factory:
    build:
      context: ../
      dockerfile: factory/Dockerfile
    container_name: nevesty-factory
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    volumes:
      - db_data:/app/nevesty-models/data.db:ro
      - factory_data:/app/factory/factory.db
      - logs_data:/app/logs
    deploy:
      resources:
        limits:
          memory: 384m
    networks:
      - nevesty-net
    depends_on:
      app:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    container_name: nevesty-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nevesty.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - nevesty-net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 5s
      retries: 3

  certbot:
    image: certbot/certbot
    container_name: nevesty-certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    profiles:
      - ssl
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

networks:
  nevesty-net:
    driver: bridge

volumes:
  uploads_data:
  db_data:
  backup_data:
  logs_data:
  factory_data:
  certbot_data:
  certbot_www:
