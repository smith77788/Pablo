[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = True
disallow_untyped_defs = False
check_untyped_defs = True
no_implicit_optional = True
exclude = __pycache__|\.pyc

[mypy-anthropic.*]
ignore_missing_imports = True

[mypy-sqlite3.*]
ignore_missing_imports = True
