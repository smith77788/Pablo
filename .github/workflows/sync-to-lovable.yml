name: Sync to Lovable (pablo-760fe3a5)

on:
  push:
    branches:
      - claude/modeling-agency-website-jp2Qd
    paths:
      - 'src/**'
      - 'supabase/**'
      - 'LOVABLE_PROMPT.md'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Pablo source branch
        uses: actions/checkout@v4
        with:
          ref: claude/modeling-agency-website-jp2Qd
          path: pablo-source
          fetch-depth: 1

      - name: Checkout pablo-760fe3a5 (Lovable)
        uses: actions/checkout@v4
        with:
          repository: smith77788/pablo-760fe3a5
          token: ${{ secrets.LOVABLE_SYNC_TOKEN }}
          path: lovable-target
          fetch-depth: 1

      - name: Sync src/ (Lovable-compatible, preserve ui/ and integrations/)
        run: |
          cd lovable-target

          # Pages — полная замена (наши страницы)
          rsync -av --delete ../pablo-source/src/pages/ src/pages/

          # Наши компоненты (admin, booking, catalog, reviews, analytics, payments, promo)
          for dir in admin booking catalog reviews analytics payments promo; do
            if [ -d "../pablo-source/src/components/$dir" ]; then
              mkdir -p src/components/$dir
              rsync -av --delete ../pablo-source/src/components/$dir/ src/components/$dir/
              echo "✓ synced components/$dir"
            fi
          done

          # Hooks — полная замена
          rsync -av --delete ../pablo-source/src/hooks/ src/hooks/

          # Types — полная замена
          rsync -av --delete ../pablo-source/src/types/ src/types/

          # lib/ — добавляем наши файлы (utils.ts, supabase.ts), НЕ удаляем чужие
          rsync -av ../pablo-source/src/lib/ src/lib/

          # integrations/supabase/client.ts — наш клиент в стандартном пути Lovable
          mkdir -p src/integrations/supabase
          cp ../pablo-source/src/integrations/supabase/client.ts \
             src/integrations/supabase/client.ts

          # App.tsx — наш роутер
          cp ../pablo-source/src/App.tsx src/App.tsx

          # НЕ трогаем: src/components/ui/ (shadcn Lovable), src/main.tsx, src/index.css
          # src/integrations/supabase/types.ts (Lovable генерирует из схемы БД)

      - name: Sync supabase/
        run: |
          cd lovable-target

          # Migration
          mkdir -p supabase/migrations
          cp ../pablo-source/supabase/migrations/003_nevesty_missing_features.sql \
             supabase/migrations/003_nevesty_missing_features.sql 2>/dev/null || true

          # Edge Functions
          for fn in telegram-webhook send-sms send-email payment-webhook broadcast; do
            if [ -d "../pablo-source/supabase/functions/$fn" ]; then
              mkdir -p supabase/functions/$fn
              cp ../pablo-source/supabase/functions/$fn/index.ts \
                 supabase/functions/$fn/index.ts
              echo "✓ synced function: $fn"
            fi
          done

      - name: Sync LOVABLE_PROMPT.md
        run: |
          cp pablo-source/LOVABLE_PROMPT.md lovable-target/LOVABLE_PROMPT.md

      - name: Debug — show changed files
        run: |
          cd lovable-target
          echo "=== Changed files ==="
          git status --short

      - name: Commit and push
        run: |
          cd lovable-target
          git config user.name "Claude Code Sync"
          git config user.email "noreply@anthropic.com"
          git add -A

          if git diff --staged --quiet; then
            echo "✅ Nothing changed — already up to date"
          else
            COMMIT_SHA=$(cd ../pablo-source && git log -1 --format='%h')
            COMMIT_MSG=$(cd ../pablo-source && git log -1 --format='%s')
            git commit -m "sync: ${COMMIT_SHA} ${COMMIT_MSG}"
            git push origin HEAD
            echo "✅ Pushed to pablo-760fe3a5"
          fi
