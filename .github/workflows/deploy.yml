name: Deploy TG Manager to Railway

on:
  push:
    branches: [main]
    paths:
      - 'tg-manager/**'
      - 'Dockerfile'
      - 'railway.json'

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: |
          cd tg-manager
          railway up --service tg-manager --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
