name: Deploy TG Manager to Railway

on:
  push:
    branches: [main, claude/telegram-bot-services-xfAh6, claude/ai-agents-business-LCLnI]
    paths:
      - 'tg-manager/**'
      - 'Dockerfile'
      - 'railway.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: |
          cd tg-manager
          railway up --service tg-manager --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_SECRET }}
