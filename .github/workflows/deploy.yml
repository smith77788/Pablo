name: Deploy TG Manager to Railway

on:
  push:
    branches: [main, claude/telegram-bot-services-xfAh6, claude/ai-agents-business-LCLnI]
    paths:
      - 'tg-manager/**'
      - 'Dockerfile'
      - 'railway.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: railwayapp/railway-deploy@v1
        with:
          railway-token: ${{ secrets.RAILWAY_SECRET }}
          service: tg-manager
