apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: tg-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: tg-platform/api:latest
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: platform-config
            - secretRef:
                name: platform-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: tg-platform
spec:
  selector:
    app: api
  ports:
    - port: 3002
      targetPort: 3002
