version: '3.9'

networks:
  nevesty-net:
    driver: bridge

volumes:
  app-data:
  app-backups:
  logs-bot:
  logs-factory:
  logs-nginx:

services:
  # ── Nginx reverse proxy ───────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nevesty-models/public:/app/nevesty-models/public:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - logs-nginx:/var/log/nginx
    depends_on:
      nevesty-models:
        condition: service_healthy
    networks:
      - nevesty-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Telegram Bot + Web Server ─────────────────────────────────────────
  nevesty-models:
    build:
      context: ./nevesty-models
      dockerfile: Dockerfile
    container_name: nevesty-bot
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: nevesty-models/.env
    volumes:
      - app-data:/app/data
      - app-backups:/app/backups
      - logs-bot:/app/logs
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - nevesty-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── AI Office Factory ─────────────────────────────────────────────────
  nevesty-factory:
    build:
      context: ./factory
      dockerfile: Dockerfile
    container_name: nevesty-factory
    restart: unless-stopped
    env_file: factory/.env
    volumes:
      - app-data:/app/data
      - logs-factory:/app/logs
    environment:
      FACTORY_CYCLE_HOURS: ${FACTORY_CYCLE_HOURS:-6}
      PYTHONPATH: /app
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD", "python3", "-c", "import os; exit(0 if os.path.isdir('/app') else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      nevesty-models:
        condition: service_healthy
    networks:
      - nevesty-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
