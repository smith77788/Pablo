version: '3.9'

networks:
  app-network:
    driver: bridge

services:
  # ── Nginx reverse proxy ───────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nevesty-models/public:/app/nevesty-models/public:ro
    depends_on:
      bot:
        condition: service_healthy
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Telegram Bot + Web Server ─────────────────────────────────────────
  bot:
    build:
      context: ./nevesty-models
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - bot-data:/app/data
      - bot-backup:/app/backup
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | python3 -c 'import sys,json; d=json.load(sys.stdin); sys.exit(0 if d.get(\"status\")==\"ok\" else 1)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      factory:
        condition: service_healthy
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── AI Office Factory ─────────────────────────────────────────────────
  factory:
    build:
      context: .
      dockerfile: Dockerfile.factory
    restart: unless-stopped
    env_file: .env
    volumes:
      - factory-data:/app/factory
      - bot-data:/app/nevesty-models/data  # shared access to bot data
    environment:
      FACTORY_CYCLE_HOURS: ${FACTORY_CYCLE_HOURS:-6}
      PYTHONPATH: /app
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; import sqlite3; conn=sqlite3.connect('/app/factory/factory.db'); conn.execute('SELECT 1'); conn.close(); print('OK')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-data:
  bot-backup:
  factory-data:
