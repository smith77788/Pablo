version: '3.9'

networks:
  app-network:
    driver: bridge

services:
  # ── Nginx reverse proxy ───────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nevesty-models/public:/app/nevesty-models/public:ro
    depends_on:
      bot:
        condition: service_healthy
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Telegram Bot + Web Server ─────────────────────────────────────────
  bot:
    build:
      context: ./nevesty-models
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - bot-data:/app/data
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      factory:
        condition: service_healthy
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── AI Office Factory ─────────────────────────────────────────────────
  factory:
    build:
      context: .
      dockerfile: Dockerfile.factory
    restart: unless-stopped
    env_file: .env
    volumes:
      - factory-data:/app/factory
      - bot-data:/app/nevesty-models/data  # shared access to bot data
    environment:
      FACTORY_CYCLE_HOURS: ${FACTORY_CYCLE_HOURS:-6}
      PYTHONPATH: /app
    healthcheck:
      test: ["CMD", "python3", "-c", "import os; exit(0 if os.path.exists('/app/factory') else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-data:
  factory-data:
